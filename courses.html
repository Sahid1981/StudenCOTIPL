<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student TACP</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/06e4f2b1fc.js" crossorigin="anonymous"></script>
</head>
<body>

<!---navigation bar--->
<div id="mainlinks">
    <div class="link">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="timetable.html">Timetable</a>
    </div>
</div>

<!--headline--->
<h1 class="headline-gradient">Courses</h1>



<!--subtitles-->
<h2 class="subtitles">CURRENT COURSES</h2>
<button id="openPopupBtn" class="addpopup" type="button"><i class="fa-solid fa-circle-plus"></i></button>

<script src="./js/popup.js"></script>
<!--popup-->
<div id="addcoursepopup" class="popup">
    <div class="popup-content">
        <h3 class="popup-headline">Add Course</h3>
        <input id="code" placeholder="Course Code"><br>
        <input id="name" placeholder="Course Name"><br>
        <input id="credits" placeholder="Credits"><br>
        <input id="lectures" placeholder="Lectures"><br>
        <input id="recordings" placeholder="Recordings"><br>
        <button id="addCourseBtn" class="popupbutton" type="button">Add Course</button>
        <button id="cancelPopupBtn" class="popupbutton" type="button">Cancel</button>
    </div>
</div>
</body>
</html>
