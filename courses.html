<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student TACP</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://kit.fontawesome.com/06e4f2b1fc.js" crossorigin="anonymous"></script>
</head>
<body>

<!---navigation bar--->
<div id="mainlinks">
    <div class="link">
            <a href="index.html">Home</a>
            <a href="courses.html">Courses</a>
            <a href="timetable.html">Timetable</a>
    </div>
</div>

<!--headline--->
<h1 class="headline-gradient">Courses</h1>



<!--Courses-->

<script type="module" src="./js/courses.js"></script>
<div id="courses">
<h2 class="subtitles">CURRENT COURSES</h2>
<button id="openPopupBtn" class="addpopup" type="button"><i class="fa-solid fa-circle-plus"></i></button>
</div>
<div id ="current"></div>
<h2 class="subtitles">PASSED COURSES</h2>
<div id="passed"></div>
<!--popup-->
<script src="./js/popup.js"></script>
<div id="addcoursepopup" class="popup" role="dialog" aria-modal="true" aria-labelledby="popupTitle">
    <div class="popup-content">
        <div class="popup-header">
            <h3 id="popupTitle" class="popup-headline">Add Course</h3>
            <button id="cancelPopupBtn" class="popup-close" type="button" aria-label="Close">x</button>
        </div>
        <div class="popup-fields">
            <input id="code" placeholder="Course Code">
            <input id="name" placeholder="Course Name">
            <input id="credits" placeholder="Credits">
            <input id="lectures" placeholder="Lectures">
            <input id="recordings" placeholder="Recordings">
        </div>
        <div class="popup-actions">
            <button id="addCourseBtn" class="popupbutton" type="button">Add Course</button>
        </div>
    </div>
</div>
</body>
</html>
